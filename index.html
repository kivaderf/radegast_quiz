<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <title>Kvíz osobnosti</title>

    <!-- Browser tab icon -->
    <link rel="icon" type="image/x-icon" href="assets/favicon_io/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon_io/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon_io/favicon-32x32.png" />

    <!-- Kiosk / iPad: fixed scale, full area, no zoom -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#14110d" />

    <!-- iOS: launch from home screen as a fullscreen app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kvíz" />
    <link rel="apple-touch-icon" href="assets/R_logo_192.png" />

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/screens.css" />
  </head>

  <body>
    <div id="app">
      <header class="app-header">
        <img src="assets/Radegast_logo.png" alt="Logo" />
      </header>

      <main class="app-main">
        <!-- 1) ID entry -->
        <section id="screen-id" class="screen is-active">
          <div class="id-wrap">
            <p class="prompt">ZADEJ <span>ID</span> BOJOVNÍKA</p>
            <p class="subtitle">Své ID najdeš v sms</p>
          </div>
          <div class="id-display-wrap">
            <div id="idDisplay" class="id-display"></div>
            <div id="keypad" class="keypad"></div>
            <button id="startBtn" class="btn" type="button" disabled>
              Zahájit výzvu
            </button>
          </div>
          <div class="id-footer">
            <img
              src="assets/colours2026_logo_datum.png"
              alt="Colours 2026"
              class="partner-logo"
            />
            <span class="eyebrow">Nemáš své ID? Zeptej se hostesky.</span>
          </div>
        </section>

        <!-- 2) Question -->
        <section id="screen-question" class="screen">
          <div class="q-top">
            <div id="dots" class="progress-dots"></div>
            <div id="qCounter" class="q-counter"></div>
          </div>
          <h1 id="qText" class="q-text"></h1>
          <div id="options" class="options"></div>
          <button id="submitBtn" class="btn q-submit" type="button" disabled>
            Potvrdit
          </button>
        </section>

        <!-- 3) Denied start -->
        <section id="screen-denied" class="screen">
          <div class="result-wrap">
            <div class="result-headlines">
              <p id="deniedHeadline1" class="result-headlines-completed"></p>
              <p id="deniedHeadline2" class="result-headlines-spoken"></p>
            </div>
            <div class="result-badgeWrap">
              <img src="assets/prijato.png" class="result-badge" alt="ID již použito" />
            </div>
            <div class="result-pointsInfo">
              <span id="deniedText"></span>
            </div>
            <div class="result-redirection">
              <span class="countdown-text"></span>
            </div>
          </div>
        </section>

        <!-- 4) Result -->
        <section id="screen-result" class="screen">
          <div class="result-wrap">
            <div class="result-headlines">
              <p class="result-headlines-completed">Výzva Dokončena</p>
              <p class="result-headlines-spoken">Radegast promluvil</p>
            </div>
            <div class="result-badgeWrap">
              <img id="resultBadge" class="result-badge" alt="Výsledek" />
              <h1 id="resultType" class="display result-type"></h1>
            </div>
            <div class="result-pointsInfo">
              <span>Tvoje hořká nátura tě předurčuje k velkým činům.<br>Body byly připsány na tvé ID.</span>
            </div>
            <div class="result-redirection">
              <span class="countdown-text"></span>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- When the iPad is in portrait -->
    <div class="rotate-hint">
      <div class="glyph">⟳</div>
      <div>Otoč zařízení na šířku</div>
    </div>

    <!-- Load order matters -->
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
